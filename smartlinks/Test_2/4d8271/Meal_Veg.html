
<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  body {
    font-family: Segoe UI, Arial, sans-serif;
    text-align: center;
    padding: 40px;
    color: #444;
  }
  .msg {
    font-size: 15px;
    margin-top: 10px;
  }
</style>
<script>
(function(){
  const p = new URLSearchParams(location.search);
  const email = p.get('email');
  if (!email) {
    alert("Invalid access. Please use the email link.");
    return;
  }

  if (!confirm("Click OK to submit your response.")) return;

  // show redirecting message
  document.body.innerHTML =
    "<h3>⏳ Logging your responses…</h3>" +
    "<div class='msg'>Please do not close this window.</div>";

  location.href =
    "https://script.google.com/a/rgipt.ac.in/macros/s/AKfycbz9zUxe6c-o97m6P6_JfSnFfvmEMLfVyGPnz-3nuJMl2jgVShaDyCWsEcTLex17my1L/exec" +
    "?campaign=Test_2" +
    "&email=" + encodeURIComponent(email) +
    "&question=Meal" +
    "&answer=Veg";
})();
</script>
</head>
<body>
<h3>Preparing submission…</h3>
</body>
</html>
